name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
    - master
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

jobs:
  checks:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        # Pin Windows to 2022 (VS2022); windows-latest moved to VS2026,
        # which classic scikit-build does not yet support.
        runs-on: [ubuntu-latest, macos-14, windows-2022]
        session: [dist, test]

    name: ${{ matrix.session }} on ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4
    - uses: fortran-lang/setup-fortran@v1
      id: setup-fortran
      with:
        compiler: gcc
        version: 12
    # setup-fortran installs MinGW via choco. The CC/FC env vars it sets are
    # not honored through the uv build chain (CMake still picks MSVC), so force
    # the GNU toolchain via CMAKE_ARGS, which scikit-build-core passes straight
    # to cmake as -D defines. Full paths avoid depending on PATH; the bin dir is
    # still added to PATH for the runtime DLLs.
    - name: Set up MinGW Fortran (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $bin = Split-Path (Get-ChildItem C:\ProgramData\chocolatey\lib\mingw -Recurse -Filter gfortran.exe | Select-Object -First 1).FullName
        Write-Host "MinGW bin: $bin"
        $fwd = $bin -replace '\\','/'
        "$bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        "CMAKE_ARGS=-DCMAKE_C_COMPILER=$fwd/gcc.exe -DCMAKE_Fortran_COMPILER=$fwd/gfortran.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
    - uses: astral-sh/setup-uv@v8.0.0
    - run: uvx nox -s ${{ matrix.session }}

  free-threading:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, windows-latest, macos-14]
    name: cibw on ${{ matrix.runs-on }}
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v8.0.0
    - uses: pypa/cibuildwheel@v2.21
      with:
          package-dir: projects/hello-free-threading
      env:
        CIBW_PRERELEASE_PYTHONS: True

  pass:
    if: always()
    needs: [checks]
    runs-on: ubuntu-latest
    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
